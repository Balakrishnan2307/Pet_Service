<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Service - Login & Signup</title>
    <link rel="shortcut icon" href="https://via.placeholder.com/32x32" type="image/x-icon">
    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --primary-color: #5cbc6b;
            --primary-hover: #4da35a;
            --primary-gradient: linear-gradient(135deg, #5cbc6b 0%, #3a9e4d 100%);
            --secondary-color: #2d3748;
            --bg-color: #f0fdf4;
            --white: #ffffff;
            --gray-light: #e2e8f0;
            --text-muted: #718096;
            --error-color: #e53e3e;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-cta: 0 8px 20px rgba(92, 188, 107, 0.4);
            --transition: all 0.3s ease;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            background-image: radial-gradient(#def7e2 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        /* --- Main Container --- */
        .auth-container {
            background: var(--white);
            width: 100%;
            max-width: 900px;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            display: flex;
            min-height: 600px;
            position: relative;
        }

        /* --- Left Side (Branding/Visual) --- */
        .auth-visual {
            flex: 1;
            background: var(--primary-color);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            color: var(--white);
            text-align: center;
            overflow: hidden;
        }

        .auth-visual::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            z-index: 1;
        }

        .visual-content {
            position: relative;
            z-index: 2;
        }

        .visual-content h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .visual-content p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }

        .pet-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* --- Right Side (Forms) --- */
        .auth-forms {
            flex: 1;
            padding: 0;
            /* Padding moved to form-box for better transition */
            position: relative;
            background: var(--white);
            overflow: hidden;
            /* Prevents overflow during transition */
        }

        .form-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo-img {
            width: 250px;
            /* margin-bottom: 1rem; */
        }

        .form-header h3 {
            font-size: 1.8rem;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* --- Form Elements --- */
        .input-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--gray-light);
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
            outline: none;
            font-family: var(--font-main);
            background-color: #fff;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(92, 188, 107, 0.1);
        }

        /* Pet Name Input with Icon */
        .pet-name-group {
            position: relative;
        }

        .pet-name-group input {
            padding-right: 45px;
            /* Make room for icon */
        }

        .pet-icon {
            position: absolute;
            right: 15px;
            top: 38px;
            /* Adjusted position */
            width: 24px;
            height: 24px;
            fill: var(--text-muted);
            pointer-events: none;
        }

        /* Checkbox & Forgot Pass */
        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--secondary-color);
        }

        .remember-me input {
            accent-color: var(--primary-color);
            width: 16px;
            height: 16px;
        }

        .forgot-pass {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-pass:hover {
            text-decoration: underline;
        }

        /* --- CTA BUTTON STYLING --- */
        .btn-cta {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            color: var(--white);
            border: none;
            border-radius: 50px;
            /* Pill shape for CTA feel */
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-cta);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-cta:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(92, 188, 107, 0.5);
            filter: brightness(1.05);
        }

        .btn-cta:active {
            transform: translateY(-1px);
        }

        /* Toggle Text */
        .switch-form {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .switch-link {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .switch-link:hover {
            text-decoration: underline;
        }

        /* --- Visibility Logic --- */
        .form-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 3rem;
            overflow-y: auto;
            background: var(--white);

            /* Transition Properties */
            opacity: 0;
            visibility: hidden;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-box.active {
            opacity: 1;
            visibility: visible;
            transform: translateX(0);
            z-index: 2;
        }

        .form-box.hidden {
            z-index: 1;
            pointer-events: none;
        }

        /* --- Responsive Design --- */
        @media (max-width: 768px) {
            .auth-container {
                flex-direction: column;
                min-height: auto;
                max-width: 500px;
            }

            .auth-visual {
                padding: 2rem;
                min-height: 250px;
            }

            .visual-content h2 {
                font-size: 1.8rem;
            }

            .pet-avatar {
                width: 100px;
                height: 100px;
                margin-bottom: 0.5rem;
            }

            /* Mobile stacking fix */
            .form-box {
                position: relative;
                height: auto;
                transform: none;
                opacity: 1;
                visibility: visible;
                pointer-events: all;
                display: none;
                /* Simple hide on mobile */
            }

            .form-box.active {
                display: block;
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Left Side: Visual / Branding -->
        <div class="auth-visual">
            <div class="visual-content">
                <img src="https://images.unsplash.com/photo-1587300003388-59208cc962cb?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80"
                    alt="Happy Dog" class="pet-avatar">
                <h2 id="visual-heading">Welcome Back!</h2>
                <p id="visual-text">Log in to manage your pet's appointments and health records.</p>
            </div>
        </div>

        <!-- Right Side: Forms Container -->
        <div class="auth-forms">

            <!-- LOGIN FORM (Active by Default) -->
            <div class="form-box active" id="login-form">
                <div class="form-header">
                    <!-- Using a placeholder logo for demonstration -->
                    <a href="index.html">
                        <img src="images/logo.png" width="350px" alt="Logo" class="logo-img">
                    </a>
                    <h3>Owner Login</h3>
                    <p>Please enter your details to sign in.</p>
                </div>

                <form action="#" method="POST" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="you@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>

                    <div class="form-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-pass">Forgot Password?</a>
                    </div>

                    <!-- UPDATED: Added btn-cta class -->
                    <button type="submit" class="btn-cta">Log In</button>
                </form>

                <div class="switch-form">
                    Don't have an account yet? <a class="switch-link" onclick="toggleSignup()">Sign Up</a>
                </div>
            </div>

            <!-- SIGNUP FORM (Hidden initially) -->
            <div class="form-box hidden" id="signup-form">
                <div class="form-header">
                    <a href="index.html">
                        <img src="images/logo.png" alt="Logo" class="logo-img">
                    </a>
                    <h3>Create Account</h3>
                    <p>Join our community of pet lovers.</p>
                </div>

                <form action="#" method="POST" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <label for="signup-name">Full Name</label>
                        <input type="text" id="signup-name" placeholder="John Doe" required>
                    </div>

                    <!-- BUG FIX: Added Pet Icon Structure -->
                    <div class="input-group">
                        <label for="signup-pet">Pet's Name</label>
                        <div class="pet-name-group">
                            <input type="text" id="signup-pet" placeholder="e.g. Bella" required>
                            <!-- SVG Icon added -->
                            <svg class="pet-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M4.5 9.5C5.32843 9.5 6 10.1716 6 11C6 11.8284 5.32843 12.5 4.5 12.5C3.67157 12.5 3 11.8284 3 11C3 10.1716 3.67157 9.5 4.5 9.5ZM7.5 6.5C8.32843 6.5 9 7.17157 9 8C9 8.82843 8.32843 9.5 7.5 9.5C6.67157 9.5 6 8.82843 6 8C6 7.17157 6.67157 6.5 7.5 6.5ZM12 4.5C12.8284 4.5 13.5 5.17157 13.5 6C13.5 6.82843 12.8284 7.5 12 7.5C11.1716 7.5 10.5 6.82843 10.5 6C10.5 5.17157 11.1716 4.5 12 4.5ZM16.5 6.5C17.3284 6.5 18 7.17157 18 8C18 8.82843 17.3284 9.5 16.5 9.5C15.6716 9.5 15 8.82843 15 8C15 7.17157 15.6716 6.5 16.5 6.5ZM19.5 9.5C20.3284 9.5 21 10.1716 21 11C21 11.8284 20.3284 12.5 19.5 12.5C18.6716 12.5 18 11.8284 18 11C18 10.1716 18.6716 9.5 19.5 9.5ZM18 14C18 16.2091 15.3137 19 12 19C8.68629 19 6 16.2091 6 14C6 12.3431 8.68629 11 12 11C15.3137 11 18 12.3431 18 14Z" />
                            </svg>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="signup-email">Email Address</label>
                        <input type="email" id="signup-email" placeholder="you@example.com" required>
                    </div>

                    <div class="input-group">
                        <label for="signup-password">Create Password</label>
                        <input type="password" id="signup-password" placeholder="••••••••" required>
                    </div>

                    <div class="input-group">
                        <label for="pet-type">Pet Type</label>
                        <select id="pet-type">
                            <option value="dog">Dog</option>
                            <option value="cat">Cat</option>
                            <option value="bird">Bird</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <!-- UPDATED: Added btn-cta class -->
                    <button type="submit" class="btn-cta">Create Account</button>
                </form>

                <div class="switch-form">
                    Already have an account? <a class="switch-link" onclick="toggleLogin()">Log In</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const visualHeading = document.getElementById('visual-heading');
        const visualText = document.getElementById('visual-text');

        function toggleSignup() {
            // Hide Login
            loginForm.classList.remove('active');
            loginForm.classList.add('hidden');

            // Show Signup
            signupForm.classList.remove('hidden');
            // Small timeout ensures transition triggers
            setTimeout(() => {
                signupForm.classList.add('active');
            }, 50);

            // Update Visual
            visualHeading.textContent = "Join the Family!";
            visualText.textContent = "Create an account to book grooming and veterinary services for your pet.";
        }

        function toggleLogin() {
            // Hide Signup
            signupForm.classList.remove('active');
            signupForm.classList.add('hidden');

            // Show Login
            loginForm.classList.remove('hidden');
            setTimeout(() => {
                loginForm.classList.add('active');
            }, 50);

            // Update Visual
            visualHeading.textContent = "Welcome Back!";
            visualText.textContent = "Log in to manage your pet's appointments and health records.";
        }
    </script>
</body>

</html>
